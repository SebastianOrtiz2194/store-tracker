spring:
  # Base de datos H2 en memoria para desarrollo rápido
  datasource:
    url: jdbc:h2:mem:storedb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  
  # Habilitar consola interactiva de H2
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Puerto de desarrollo
server:
  port: 8080

# Logging detallado para desarrollo
logging:
  level:
    root: INFO
    com.store.tracker: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
