spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/store_tracker}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

logging:
  level:
    root: INFO
    com.store.tracker: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
