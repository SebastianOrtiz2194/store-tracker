spring:
  application:
    name: store-tracker
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "health"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
