spring:
  application:
    name: store-tracker
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev} # Perfil activo por defecto
  
  # Configuración común de Jackson para manejo de fechas
  jackson:
    serialization:
      write-dates-as-timestamps: false

# Configuración del servidor compartida
server:
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

# Gestión y Observabilidad
management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "health" # Solo salud expuesta por defecto en base

# Documentación OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
